<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Messenger - Jacklyn Rose</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body, html {
            height: 100%;
            overflow: hidden; /* পুরো পেজ স্ক্রল হবে না */
            background-color: #fff;
        }

        /* হেডার ডিজাইন */
        .header {
            position: fixed;
            top: 0;
            width: 100%;
            height: 60px;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            border-bottom: 1px solid #ddd;
            z-index: 1000;
        }

        .profile-section {
            display: flex;
            align-items: center;
        }

        .back-icon { margin-right: 15px; font-size: 20px; color: #0084ff; }

        .profile-pic-container {
            position: relative;
            width: 40px;
            height: 40px;
        }

        .profile-pic {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .active-symbol {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            background-color: #31a24c;
            border: 2px solid #fff;
            border-radius: 50%;
        }

        .user-info { margin-left: 10px; }
        .user-name { font-weight: bold; font-size: 16px; display: flex; align-items: center; }
        .verified-badge { color: #0084ff; font-size: 14px; margin-left: 5px; }
        .status-text { font-size: 12px; color: #65676b; }

        .video-call-btn { color: #0084ff; font-size: 22px; cursor: pointer; }

        /* চ্যাট এরিয়া */
        .chat-container {
            position: absolute;
            top: 60px;
            bottom: 70px;
            width: 100%;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            background-color: #fff;
        }

        /* মিডল প্রোফাইল সেকশন (আপনার বর্ণনা অনুযায়ী) */
        .middle-profile {
            text-align: center;
            margin-top: 30px;
            margin-bottom: 30px;
        }

        .middle-pic {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin-bottom: 10px;
        }

        .middle-name { font-size: 22px; font-weight: 800; }
        .location { color: #65676b; font-size: 14px; margin-top: 5px; }
        .not-friends { font-size: 14px; color: #65676b; margin-top: 10px; }
        .add-friend-btn {
            margin-top: 15px;
            padding: 8px 20px;
            background: #e4e6eb;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        /* মেসেজ বাবল */
        .message {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 18px;
            margin-bottom: 10px;
            font-size: 15px;
        }
        .received { background: #e4e6eb; align-self: flex-start; }

        /* ইনপুট বক্স ও ফুটার */
        .footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #fff;
            padding: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-top: 1px solid #ddd;
            transition: bottom 0.3s ease;
        }

        .input-box {
            flex: 1;
            background: #f0f2f5;
            border-radius: 20px;
            padding: 8px 15px;
            display: flex;
            align-items: center;
        }

        .input-box input {
            border: none;
            background: transparent;
            width: 100%;
            outline: none;
            font-size: 15px;
        }

        .emoji-btn { color: #0084ff; font-size: 20px; cursor: pointer; }
        .send-btn { color: #0084ff; font-size: 20px; cursor: pointer; }

    </style>
</head>
<body>

    <!-- হেডার সেকশন -->
    <div class="header">
        <div class="profile-section">
            <i class="fa-solid fa-arrow-left back-icon"></i>
            <div class="profile-pic-container">
                <img src="https://i.pravatar.cc/150?u=jacklyn" class="profile-pic" alt="Jacklyn">
                <div class="active-symbol"></div>
            </div>
            <div class="user-info">
                <div class="user-name">
                    Jacklyn Rose <i class="fa-solid fa-circle-check verified-badge"></i>
                </div>
                <div class="status-text">Active now</div>
            </div>
        </div>
        <div class="video-call-btn" onclick="alert('Starting Video Call...')">
            <i class="fa-solid fa-video"></i>
        </div>
    </div>

    <!-- চ্যাট বডি -->
    <div class="chat-container" id="chatContainer">
        <!-- মাঝখানের বড় প্রোফাইল অংশ -->
        <div class="middle-profile">
            <img src="https://i.pravatar.cc/150?u=jacklyn" class="middle-pic">
            <div class="middle-name">Jacklyn Rose <i class="fa-solid fa-circle-check verified-badge"></i></div>
            <div class="location">New York City, USA</div>
            <div class="not-friends">You are not friends with Jacklyn Rose on Messenger.</div>
            <button class="add-friend-btn">
                <i class="fa-solid fa-user-plus"></i> Add Friend
            </button>
        </div>

        <!-- কিছু ডামি মেসেজ -->
        <div class="message received">Hi! How can I help you today?</div>
    </div>

    <!-- ফুটার ইনপুট সেকশন -->
    <div class="footer" id="footer">
        <i class="fa-solid fa-circle-plus emoji-btn"></i>
        <div class="input-box">
            <input type="text" placeholder="Aa" id="msgInput">
            <i class="fa-regular fa-face-smile emoji-btn"></i>
        </div>
        <i class="fa-solid fa-paper-plane send-btn" onclick="sendMessage()"></i>
    </div>

    <script>
        const msgInput = document.getElementById('msgInput');
        const chatContainer = document.getElementById('chatContainer');
        const footer = document.getElementById('footer');

        // কিবোর্ড ওপেন হলে মেসেজ বক্স উপরে তোলা (মোবাইল ব্রাউজারের জন্য)
        msgInput.addEventListener('focus', () => {
            // অনেক মোবাইল ব্রাউজারে এটি অটো হয়, তবে লেআউট ফিক্সড রাখার জন্য এটি সহায়ক
            window.scrollTo(0, 0);
            setTimeout(() => {
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }, 300);
        });

        // মেসেজ পাঠানোর ফাংশন
        function sendMessage() {
            const text = msgInput.value.trim();
            if (text !== "") {
                const msgDiv = document.createElement('div');
                msgDiv.className = 'message sent';
                msgDiv.style.cssText = "background: #0084ff; color: #fff; align-self: flex-end; max-width: 70%; padding: 10px 15px; border-radius: 18px; margin-bottom: 10px;";
                msgDiv.textContent = text;
                chatContainer.appendChild(msgDiv);
                msgInput.value = "";
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }
        }

        // Enter চাপলে মেসেজ যাবে
        msgInput.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        });
    </script>

</body>
</html>
