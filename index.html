<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Messenger - Jacklyn Rose</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body, html { height: 100%; overflow: hidden; background-color: #fff; width: 100%; position: fixed; }

        .verified-badge { color: #0084ff; font-size: 14px; margin-left: 4px; }

        .header { position: fixed; top: 0; width: 100%; height: 60px; background: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; border-bottom: 1px solid #ddd; z-index: 1000; }
        .profile-section { display: flex; align-items: center; }
        .header-pic { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .user-info { margin-left: 10px; }
        .user-name { font-weight: bold; font-size: 16px; display: flex; align-items: center; }

        .chat-container { position: absolute; top: 60px; bottom: 85px; width: 100%; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; background: #fff; }

        /* মিডল প্রোফাইল */
        .middle-profile { text-align: center; margin: 30px 0; }
        .middle-pic { width: 100px; height: 100px; border-radius: 50%; margin-bottom: 10px; }
        .middle-name { font-size: 22px; font-weight: 800; display: flex; align-items: center; justify-content: center; }
        .location { color: #65676b; font-size: 14px; margin-top: 5px; }
        .not-friends { font-size: 13px; color: #65676b; margin-top: 10px; padding: 0 20px; }
        .add-friend-btn { margin-top: 15px; padding: 10px 25px; background: #e4e6eb; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .add-friend-btn.is-friend { background: #31a24c; color: white; }

        .message-wrapper { display: flex; align-items: flex-end; margin-bottom: 12px; gap: 8px; }
        .msg-profile-pic { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; }
        .message { max-width: 70%; padding: 10px 15px; border-radius: 18px; font-size: 15px; line-height: 1.4; }
        .received { background: #e4e6eb; color: #000; }
        .sent { background: #0084ff; color: #fff; align-self: flex-end; margin-left: auto; }

        /* ফুটার আপডেট */
        .footer { position: fixed; bottom: 0; width: 100%; background: #fff; padding: 12px 15px; display: flex; align-items: center; gap: 12px; border-top: 1px solid #ddd; z-index: 1000; height: 75px; }
        .footer i { font-size: 24px; cursor: pointer; color: #0084ff; }
        .input-box { flex: 1; background: #f0f2f5; border-radius: 25px; padding: 10px 18px; display: flex; align-items: center; height: 45px; }
        .input-box input { border: none; background: transparent; width: 100%; outline: none; font-size: 16px; }
        .input-box i { font-size: 22px; margin-left: 8px; }

        /* প্রিমিয়াম টেমপ্লেট ও কল লজিক ডিজাইন সেম রাখা হয়েছে */
        #premiumModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 5000; color: white; align-items: center; justify-content: center; text-align: center; padding: 30px; backdrop-filter: blur(10px); }
        .premium-box { background: #fff; color: #000; padding: 25px; border-radius: 20px; width: 100%; max-width: 350px; }
        .reg-btn { display: block; width: 100%; background: #0084ff; color: #fff; padding: 12px; border-radius: 10px; text-decoration: none; font-weight: bold; margin-top: 15px; }
        
        #videoOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 3000; color: white; }
        #callUI { position: absolute; top: 80px; width: 100%; text-align: center; z-index: 3001; }
        #callUI img { width: 110px; height: 110px; border-radius: 50%; border: 2px solid #fff; }
        video#mainVideo { width: 100%; height: 100%; object-fit: cover; display: none; }
        video#userPreview { position: absolute; top: 20px; right: 20px; width: 100px; height: 150px; border-radius: 10px; display: none; object-fit: cover; border: 1px solid #444; }
        .call-controls { position: absolute; bottom: 60px; width: 100%; display: flex; justify-content: center; gap: 40px; z-index: 3002; }
        .btn-call { width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="premiumModal">
        <div class="premium-box">
            <i class="fa-solid fa-lock" style="font-size: 40px; color: #0084ff; margin-bottom: 15px;"></i>
            <h3>Limit Exceeded!</h3>
            <p>To continue video calls and unlimited messages for free, please register on our official website now.</p>
            <a href="YOUR_AFFILIATE_LINK_HERE" class="reg-btn">Register for Free</a>
            <div onclick="closePremium()" style="margin-top:15px; color:#666; cursor:pointer;">Back to Chat</div>
        </div>
    </div>

    <div id="videoOverlay">
        <div id="callUI">
            <img src="https://i.pravatar.cc/150?u=jacklyn">
            <h2 class="middle-name" style="color:white; margin-top:10px;">Jacklyn Rose <i class="fa-solid fa-circle-check verified-badge"></i></h2>
            <div id="callStatusText">Calling...</div>
            <div id="timerDisplay" style="margin-top:10px; font-size:16px; display:none;">00:00</div>
        </div>
        <video id="mainVideo" playsinline></video>
        <video id="userPreview" autoplay muted playsinline></video>
        <div class="call-controls">
            <div class="btn-call" style="background:#fa3e3e;" onclick="endCall()"><i class="fa-solid fa-phone-slash"></i></div>
            <div id="answerBtn" class="btn-call" style="background:#31a24c; display:none;" onclick="checkLimitBeforeAccept()"><i class="fa-solid fa-video"></i></div>
        </div>
    </div>

    <div class="header">
        <div class="profile-section">
            <i class="fa-solid fa-arrow-left" style="color:#0084ff; margin-right:10px;"></i>
            <img src="https://i.pravatar.cc/150?u=jacklyn" class="header-pic">
            <div class="user-info">
                <div class="user-name">Jacklyn Rose <i class="fa-solid fa-circle-check verified-badge"></i></div>
                <div style="font-size:11px; color:#65676b;">Active now</div>
            </div>
        </div>
        <div style="color:#0084ff; font-size:22px; cursor:pointer;" onclick="startOutgoingCall()"><i class="fa-solid fa-video"></i></div>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="middle-profile">
            <img src="https://i.pravatar.cc/150?u=jacklyn" class="middle-pic">
            <div class="middle-name">Jacklyn Rose <i class="fa-solid fa-circle-check verified-badge"></i></div>
            <div class="location">Miami, Florida</div>
            <div class="not-friends" id="friendStatus">You are not friends with Jacklyn Rose on Messenger.</div>
            <button class="add-friend-btn" id="addFriendBtn" onclick="toggleFriend()"><i class="fa-solid fa-user-plus"></i> Add Friend</button>
        </div>
        <div id="messagesArea"></div>
    </div>

    <div class="footer">
        <label for="mediaInput"><i class="fa-solid fa-circle-plus"></i></label>
        <input type="file" id="mediaInput" style="display:none;" accept="image/*,video/*">
        
        <div class="input-box">
            <input type="text" id="msgInput" placeholder="Aa" autocomplete="off">
            <i class="fa-regular fa-face-smile" onclick="document.getElementById('msgInput').focus()"></i>
        </div>
        <i class="fa-solid fa-paper-plane" id="sendBtn" style="font-size: 26px;"></i>
    </div>

    <script>
        // সব ভেরিয়েবল এবং লজিক আপনার পূর্বের নিয়ম অনুযায়ী সেভ রাখা হয়েছে
        const messagesArea = document.getElementById('messagesArea');
        const chatContainer = document.getElementById('chatContainer');
        const msgInput = document.getElementById('msgInput');
        const videoOverlay = document.getElementById('videoOverlay');
        const timerDisplay = document.getElementById('timerDisplay');
        const premiumModal = document.getElementById('premiumModal');

        let callCount = 0;
        let sentMessageCount = 0;
        let seconds = 0;
        let callTimerInterval;

        // Add Friend বাটন লজিক
        function toggleFriend() {
            const btn = document.getElementById('addFriendBtn');
            const status = document.getElementById('friendStatus');
            btn.innerHTML = '<i class="fa-solid fa-user-check"></i> Friends';
            btn.classList.add('is-friend');
            status.innerText = "You are friends with Jacklyn Rose.";
        }

        function showPremium() { premiumModal.style.display = 'flex'; }
        function closePremium() { premiumModal.style.display = 'none'; }

        // ভিডিও কল এবং মেসেজিং লজিক (আপনার দেওয়া নিয়ম অনুযায়ী)
        function startOutgoingCall() {
            if(callCount >= 2) { showPremium(); return; }
            videoOverlay.style.display = 'block';
            document.getElementById('callStatusText').innerText = "Calling...";
            timerDisplay.style.display = 'none';
            setTimeout(acceptCall, 3000);
        }

        function checkLimitBeforeAccept() {
            if(callCount >= 2) { videoOverlay.style.display = 'none'; showPremium(); } 
            else { acceptCall(); }
        }

        async function acceptCall() {
            callCount++;
            document.getElementById('callUI').style.display = 'none'; 
            document.getElementById('mainVideo').style.display = 'block';
            document.getElementById('userPreview').style.display = 'block';
            timerDisplay.style.display = 'block';
            document.getElementById('answerBtn').style.display = 'none';

            document.getElementById('mainVideo').src = "https://www.w3schools.com/html/mov_bbb.mp4";
            document.getElementById('mainVideo').play();

            seconds = 0;
            callTimerInterval = setInterval(() => {
                seconds++;
                let m = Math.floor(seconds/60).toString().padStart(2, '0');
                let s = (seconds%60).toString().padStart(2, '0');
                timerDisplay.innerText = `${m}:${s}`;
            }, 1000);

            let hangupTime = (callCount === 1) ? 14000 : 12000;
            setTimeout(endCall, hangupTime);
        }

        function endCall() {
            clearInterval(callTimerInterval);
            videoOverlay.style.display = 'none';
            // কল লগ রেন্ডারিং এবং অন্যান্য লজিক আগের মতোই কাজ করবে...
        }

        function sendMessage() {
            const text = msgInput.value.trim();
            if (!text) return;
            if (sentMessageCount >= 3) { showPremium(); return; }
            sentMessageCount++;
            messagesArea.insertAdjacentHTML('beforeend', `<div class="message-wrapper" style="justify-content:flex-end;"><div class="message sent">${text}</div></div>`);
            msgInput.value = "";
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        msgInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
