<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Messenger Live</title>
    <style>
        :root {
            --messenger-blue: #0084ff;
            --bg-gray: #f0f2f5;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; }

        body, html { 
            height: 100%; width: 100%; overflow: hidden; 
            background-color: var(--bg-gray);
            position: fixed; /* মোবাইল স্ক্রিন লক করার জন্য */
        }

        .app-wrapper {
            height: 100vh; width: 100vw;
            display: flex; flex-direction: column;
            background: #fff;
        }

        /* Header */
        .header {
            height: 60px; background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px); display: flex;
            align-items: center; padding: 0 15px;
            justify-content: space-between; border-bottom: 1px solid rgba(0,0,0,0.08);
            z-index: 1000;
        }

        .user-meta { display: flex; align-items: center; }
        .avatar-box { position: relative; width: 40px; height: 40px; margin-right: 12px; }
        .avatar-box img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .online-status { 
            position: absolute; bottom: 2px; right: 2px; 
            width: 12px; height: 12px; background: #31a24c; 
            border-radius: 50%; border: 2.5px solid white; 
        }

        .user-info h4 { font-size: 15px; font-weight: 600; color: #050505; }
        .user-info p { font-size: 12px; color: #65676b; }

        /* Chat Area */
        .chat-container {
            flex: 1; overflow-y: auto; padding: 15px;
            display: flex; flex-direction: column;
            background: white;
        }

        .profile-hero { text-align: center; margin: 30px 0; }
        .hero-img { width: 100px; height: 100px; border-radius: 50%; margin-bottom: 10px; }
        .hero-name { font-size: 22px; font-weight: 700; }
        .hero-sub { font-size: 13px; color: #65676b; margin-top: 5px; }

        /* Messages */
        .msg { 
            max-width: 75%; padding: 10px 16px; border-radius: 18px; 
            margin-bottom: 8px; font-size: 15px; line-height: 1.4;
            word-wrap: break-word; position: relative;
        }
        .bot { align-self: flex-start; background: #e4e6eb; color: #050505; border-bottom-left-radius: 4px; }
        .user { align-self: flex-end; background: var(--messenger-blue); color: #fff; border-bottom-right-radius: 4px; }

        /* Typing Indicator */
        #typing { font-size: 12px; color: #65676b; margin: 5px 0 10px 5px; display: none; }

        /* Footer */
        .footer {
            height: 70px; background: white; display: flex;
            align-items: center; padding: 10px 15px;
            padding-bottom: env(safe-area-inset-bottom);
            border-top: 1px solid rgba(0,0,0,0.05);
        }

        .input-wrapper {
            flex: 1; background: #f0f2f5; border-radius: 20px;
            padding: 8px 15px; display: flex; align-items: center;
        }

        .input-wrapper input {
            border: none; background: transparent; flex: 1;
            outline: none; font-size: 16px; height: 25px;
        }

        .send-btn { color: var(--messenger-blue); font-size: 20px; margin-left: 12px; border: none; background: none; font-weight: bold; }

        /* Call System UI */
        .call-overlay {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: none; flex-direction: column; align-items: center; justify-content: center; color: #fff;
        }

        .caller-img { width: 120px; height: 120px; border-radius: 50%; border: 3px solid #fff; margin-bottom: 20px; }
        .call-actions { position: absolute; bottom: 80px; width: 100%; display: flex; justify-content: space-around; }
        .action-btn { width: 70px; height: 70px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; font-size: 30px; color: white; cursor: pointer; }
        .decline { background: #ff3b30; }
        .accept { background: #4cd964; }

        video#mainVideo { width: 100%; height: 100%; object-fit: cover; display: none; }
        
        /* Modal */
        .modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; width: 85%; padding: 25px; border-radius: 15px;
            text-align: center; z-index: 10000; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .reg-link { display: block; background: var(--messenger-blue); color: #fff; text-decoration: none; padding: 12px; border-radius: 8px; font-weight: bold; margin-top: 15px; }

    </style>
</head>
<body>

<div class="app-wrapper">
    <!-- Header -->
    <div class="header">
        <div class="user-meta">
            <div class="avatar-box">
                <img src="https://i.pravatar.cc/150?u=suraiya" alt="Profile">
                <div class="online-status"></div>
            </div>
            <div class="user-info">
                <h4>Mst Suraiya Akter</h4>
                <p>Active now</p>
            </div>
        </div>
        <div style="display: flex; align-items: center;">
            <img src="https://cdn-icons-png.flaticon.com/512/1159/1159791.png" width="24" id="manualCallBtn" style="cursor: pointer;">
        </div>
    </div>

    <!-- Chat -->
    <div class="chat-container" id="chatBox">
        <div class="profile-hero">
            <img src="https://i.pravatar.cc/150?u=suraiya" class="hero-img">
            <h2 class="hero-name">Mst Suraiya Akter</h2>
            <p class="hero-sub">Messenger • Active Now</p>
        </div>
        <div id="messages"></div>
        <div id="typing">Suraiya is typing...</div>
    </div>

    <!-- Footer -->
    <div class="footer">
        <div class="input-wrapper">
            <input type="text" id="userInput" placeholder="Aa">
        </div>
        <button class="send-btn" id="sendBtn">➤</button>
    </div>
</div>

<!-- Video Call UI -->
<div class="call-overlay" id="callOverlay">
    <div id="incomingCall">
        <img src="https://i.pravatar.cc/150?u=suraiya" class="caller-img">
        <h2>Mst Suraiya Akter</h2>
        <p style="margin-top: 10px;">Incoming video call...</p>
        <div class="call-actions">
            <button class="action-btn decline" onclick="endCall()">✕</button>
            <button class="action-btn accept" onclick="acceptCall()">✓</button>
        </div>
    </div>
    <video id="mainVideo" playsinline></video>
    <audio id="ringtone" src="https://www.soundjay.com/phone/phone-calling-1.mp3" loop></audio>
</div>

<!-- Limit Modal -->
<div class="modal" id="limitModal">
    <h3>Messaging Limit Reached</h3>
    <p style="margin-top:10px; color:#65676b;">Please register for free to continue your conversation and video calls.</p>
    <a href="YOUR_AFFILIATE_LINK" class="reg-link">REGISTER FOR FREE (ENGLISH)</a>
</div>

<script>
    let messageCount = 0;
    let callReceived = false;
    const chatBox = document.getElementById('chatBox');
    const messagesDiv = document.getElementById('messages');
    const ringtone = document.getElementById('ringtone');

    const replies = [
        "Hello, How are you☺️", "You look so handsome", "Where do you live?", 
        "I'm feeling lonely tonight... 🥺", "Want to see me on video call?",
        "Are you married?", "I like your profile picture!", "Let's be friends!",
        "Can we talk privately? 😈", "You are so sweet!", "I am waiting for your reply",
        "Can you hear me?", "I want to show you something...", "Are you free now?",
        "What are you doing?", "I'm thinking about you", "Tell me more about yourself",
        "I love talking to you", "Do you like me?", "You are very charming",
        "Let's play a game?", "I have a secret to tell you...", "Send me a photo!",
        "I'm bored, entertain me!", "You're different from other guys", 
        "I feel a connection with you", "Can we meet sometime?", "You're so hot!",
        "Missing you already!", "Register and let's talk more! 😘"
    ];

    const followUps = [
        "Hey, why aren't you replying? 🥺",
        "I'm still waiting for you...",
        "Are you busy?",
        "Don't go away!",
        "I have something special for you..."
    ];

    // ১. মেসেজিং সিস্টেম
    document.getElementById('sendBtn').onclick = sendMessage;
    document.getElementById('userInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });

    function sendMessage() {
        const text = document.getElementById('userInput').value.trim();
        if(!text) return;

        if(messageCount >= 5) {
            document.getElementById('limitModal').style.display = 'block';
            return;
        }

        appendMessage(text, 'user');
        document.getElementById('userInput').value = '';
        messageCount++;

        // অটো রিপ্লে
        setTimeout(() => { document.getElementById('typing').style.display = 'block'; scroll(); }, 1500);
        setTimeout(() => {
            document.getElementById('typing').style.display = 'none';
            appendMessage(replies[Math.floor(Math.random() * replies.length)], 'bot');
            
            if(messageCount === 5) startFollowUps();
        }, 4000);
    }

    function appendMessage(text, side) {
        const div = document.createElement('div');
        div.className = `msg ${side}`;
        div.innerText = text;
        messagesDiv.appendChild(div);
        scroll();
    }

    function scroll() { chatBox.scrollTop = chatBox.scrollHeight; }

    // ২. ভিডিও কলিং সিস্টেম
    setTimeout(() => triggerCall("AUTO_VIDEO_URL"), 12000); // ১২ সেকেন্ড পর অটো কল
    setInterval(() => { if(!callReceived) triggerCall("AUTO_VIDEO_URL"); }, 30000); // ৩০ সেকেন্ড পর পর

    document.getElementById('manualCallBtn').onclick = () => {
        triggerCall("MANUAL_VIDEO_URL");
        setTimeout(acceptCall, 3000); // ৩ সেকেন্ড পর অটো রিসিভ
    };

    function triggerCall(src) {
        if(callReceived) return;
        document.getElementById('callOverlay').style.display = 'flex';
        document.getElementById('mainVideo').src = src;
        ringtone.play();
    }

    function acceptCall() {
        ringtone.pause();
        document.getElementById('incomingCall').style.display = 'none';
        const v = document.getElementById('mainVideo');
        v.style.display = 'block';
        v.play();
        callReceived = true;

        setTimeout(() => {
            endCall();
            document.getElementById('limitModal').style.display = 'block';
        }, 10000); // ১০ সেকেন্ড পর কল শেষ
    }

    function endCall() {
        document.getElementById('callOverlay').style.display = 'none';
        document.getElementById('mainVideo').pause();
        ringtone.pause();
    }

    // ৩. নোটিফিকেশন ও ফলোআপ (শাটার নোটিফিকেশন)
    function startFollowUps() {
        let count = 0;
        let fastFollow = setInterval(() => {
            if(count < 10) {
                showNotification(followUps[Math.floor(Math.random()*followUps.length)]);
                count++;
            } else {
                clearInterval(fastFollow);
                setInterval(() => {
                    showNotification(followUps[Math.floor(Math.random()*followUps.length)]);
                }, 3600000); // ১ ঘণ্টা পর পর
            }
        }, 10000); // প্রথম ১০টি ১০ সেকেন্ড পর পর
    }

    function showNotification(body) {
        if (Notification.permission === "granted") {
            new Notification("Mst Suraiya Akter", {
                body: body,
                icon: "https://i.pravatar.cc/150?u=suraiya"
            });
        }
    }

    window.onload = () => {
        if ("Notification" in window) Notification.requestPermission();
    };

</script>
</body>
</html>
