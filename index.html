<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Messenger - Jacklyn Rose</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body, html { height: 100%; overflow: hidden; background-color: #fff; width: 100%; position: fixed; }

        .verified-badge { color: #0084ff; font-size: 13px; margin-left: 3px; }

        .header { position: fixed; top: 0; width: 100%; height: 60px; background: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; border-bottom: 1px solid #ddd; z-index: 1000; }
        .profile-section { display: flex; align-items: center; }
        .header-pic { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .user-name { font-weight: bold; font-size: 16px; display: flex; align-items: center; margin-left: 10px; }

        .chat-container { position: absolute; top: 60px; bottom: 70px; width: 100%; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; background: #fff; }

        /* মেসেজ উইথ প্রোফাইল পিক */
        .message-wrapper { display: flex; align-items: flex-end; margin-bottom: 15px; gap: 8px; }
        .msg-profile-pic { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; }
        .message { max-width: 70%; padding: 10px 15px; border-radius: 18px; font-size: 15px; line-height: 1.4; }
        .received { background: #e4e6eb; color: #000; }
        .sent { background: #0084ff; color: #fff; align-self: flex-end; margin-left: auto; }
        .sent-wrapper { justify-content: flex-end; }

        /* কল লগ স্টাইল */
        .call-log-box { background: #333; color: white; padding: 15px; border-radius: 20px; width: 260px; margin-bottom: 15px; }
        .call-log-info { display: flex; align-items: center; gap: 12px; }
        .call-log-icon-bg { width: 35px; height: 35px; background: #555; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .call-again-btn { background: #444; text-align: center; padding: 8px; border-radius: 10px; margin-top: 10px; font-weight: 600; }

        /* কল স্ক্রিন */
        #videoOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #111; z-index: 3000; color: white; text-align: center; }
        .call-header { margin-top: 80px; }
        .call-header img { width: 110px; height: 110px; border-radius: 50%; border: 2px solid #fff; }
        #callTimer { font-size: 18px; margin-top: 10px; color: #ccc; }
        
        video#mainVideo { width: 100%; height: 100%; object-fit: cover; display: none; }
        video#userPreview { position: absolute; top: 20px; right: 20px; width: 100px; height: 150px; border-radius: 10px; display: none; object-fit: cover; border: 1px solid #444; }

        .call-controls { position: absolute; bottom: 60px; width: 100%; display: flex; justify-content: center; gap: 40px; }
        .btn-call { width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; }
        .btn-hangup { background: #fa3e3e; }
        .btn-answer { background: #31a24c; }

        .footer { position: fixed; bottom: 0; width: 100%; background: #fff; padding: 10px; display: flex; align-items: center; gap: 10px; border-top: 1px solid #ddd; z-index: 1000; }
        .input-box { flex: 1; background: #f0f2f5; border-radius: 20px; padding: 8px 15px; display: flex; }
        .input-box input { border: none; background: transparent; width: 100%; outline: none; }
        .typing { font-size: 12px; color: #65676b; display: none; margin: 5px 0 10px 40px; }
    </style>
</head>
<body>

    <div id="videoOverlay">
        <div class="call-header" id="callInfoUI">
            <img src="https://i.pravatar.cc/150?u=jacklyn">
            <h2 style="display:flex; align-items:center; justify-content:center; margin-top:15px;">
                Jacklyn Rose <i class="fa-solid fa-circle-check verified-badge"></i>
            </h2>
            <div id="callStatusText" style="margin-top:10px;">Incoming video call...</div>
            <div id="callTimer">00:00</div>
        </div>
        
        <video id="mainVideo" playsinline></video>
        <video id="userPreview" autoplay muted playsinline></video>

        <div class="call-controls">
            <div class="btn-call btn-hangup" onclick="endCall()"><i class="fa-solid fa-phone-slash"></i></div>
            <div class="btn-call btn-answer" id="answerBtn" onclick="acceptCall()"><i class="fa-solid fa-video"></i></div>
        </div>
    </div>

    <div class="header">
        <div class="profile-section">
            <i class="fa-solid fa-arrow-left" style="color:#0084ff; margin-right:10px;"></i>
            <img src="https://i.pravatar.cc/150?u=jacklyn" class="header-pic">
            <div class="user-name">Jacklyn Rose <i class="fa-solid fa-circle-check verified-badge"></i></div>
        </div>
        <div style="color:#0084ff; font-size:22px;" onclick="startOutgoingCall()"><i class="fa-solid fa-video"></i></div>
    </div>

    <div class="chat-container" id="chatContainer">
        <div id="messagesArea"></div>
        <div class="typing" id="typingIndicator">Jacklyn is typing...</div>
    </div>

    <div class="footer">
        <i class="fa-solid fa-circle-plus" style="color:#0084ff;"></i>
        <div class="input-box">
            <input type="text" id="msgInput" placeholder="Aa" autocomplete="off">
            <i class="fa-regular fa-face-smile" style="color:#0084ff;"></i>
        </div>
        <i class="fa-solid fa-paper-plane" id="sendBtn" style="color:#0084ff; cursor:pointer;"></i>
    </div>

    <script>
        const messagesArea = document.getElementById('messagesArea');
        const chatContainer = document.getElementById('chatContainer');
        const msgInput = document.getElementById('msgInput');
        const videoOverlay = document.getElementById('videoOverlay');
        const callTimerTxt = document.getElementById('callTimer');
        const typingIndicator = document.getElementById('typingIndicator');

        let replyIndex = 0;
        let inactivityTimer;
        let callInterval;
        let seconds = 0;
        let isWaitingForReply = true;

        const autoReplies = ["Hey handsome.. 😉", "Thinking about tonight.. 😈", "You look like a guy who knows how to treat a lady...", "Want to keep me company? 💋"];
        const nagReplies = ["Are you ok?", "Reply me", "Why you stop?", "Keep chatting with me.."];

        function startInactivityTimer() {
            clearTimeout(inactivityTimer);
            if (!isWaitingForReply) return;

            inactivityTimer = setTimeout(() => {
                typingIndicator.style.display = 'block';
                setTimeout(() => {
                    typingIndicator.style.display = 'none';
                    receiveMessage(nagReplies[replyIndex % nagReplies.length]);
                    isWaitingForReply = false; // একটার পর থেমে যাবে
                }, 3000);
            }, 15000);
        }

        function receiveMessage(text) {
            const html = `
                <div class="message-wrapper">
                    <img src="https://i.pravatar.cc/150?u=jacklyn" class="msg-profile-pic">
                    <div class="message received">${text}</div>
                </div>
            `;
            messagesArea.insertAdjacentHTML('beforeend', html);
            scrollToBottom();

            if (text === autoReplies[0] || text === autoReplies[2]) {
                setTimeout(triggerIncomingCall, 1500);
            }
        }

        function sendMessage() {
            const text = msgInput.value.trim();
            if (!text) return;

            const html = `
                <div class="message-wrapper sent-wrapper">
                    <div class="message sent">${text}</div>
                </div>
            `;
            messagesArea.insertAdjacentHTML('beforeend', html);
            msgInput.value = "";
            scrollToBottom();
            isWaitingForReply = true;
            clearTimeout(inactivityTimer);

            setTimeout(() => {
                typingIndicator.style.display = 'block';
                setTimeout(() => {
                    typingIndicator.style.display = 'none';
                    if(replyIndex < autoReplies.length) {
                        receiveMessage(autoReplies[replyIndex]);
                        replyIndex++;
                    }
                    startInactivityTimer();
                }, 3000);
            }, 2000);
        }

        // --- কল সিস্টেম ---
        function triggerIncomingCall() {
            videoOverlay.style.display = 'block';
            document.getElementById('callStatusText').innerText = "Incoming video call...";
            document.getElementById('answerBtn').style.display = 'flex';
        }

        function startOutgoingCall() {
            videoOverlay.style.display = 'block';
            document.getElementById('callStatusText').innerText = "Calling...";
            document.getElementById('answerBtn').style.display = 'none';
            setTimeout(acceptCall, 3000); // ৩ সেকেন্ড পর অটো রিসিভ
        }

        async function acceptCall() {
            document.getElementById('callStatusText').innerText = "Connected";
            document.getElementById('answerBtn').style.display = 'none';
            document.getElementById('mainVideo').style.display = 'block';
            document.getElementById('userPreview').style.display = 'block';
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
                document.getElementById('userPreview').srcObject = stream;
            } catch(e) {}

            document.getElementById('mainVideo').src = "https://www.w3schools.com/html/mov_bbb.mp4";
            document.getElementById('mainVideo').play();

            // টাইমার শুরু
            seconds = 0;
            callInterval = setInterval(() => {
                seconds++;
                let m = Math.floor(seconds/60).toString().padStart(2, '0');
                let s = (seconds%60).toString().padStart(2, '0');
                callTimerTxt.innerText = `${m}:${s}`;
            }, 1000);
        }

        function endCall() {
            clearInterval(callInterval);
            const duration = callTimerTxt.innerText;
            videoOverlay.style.display = 'none';
            document.getElementById('mainVideo').pause();
            if(document.getElementById('userPreview').srcObject) {
                document.getElementById('userPreview').srcObject.getTracks().forEach(t => t.stop());
            }
            
            const logHTML = `
                <div class="call-log-box">
                    <div class="call-log-info">
                        <div class="call-log-icon-bg"><i class="fa-solid fa-phone-arrow-up-right"></i></div>
                        <div>
                            <div style="font-weight:bold;">Video call</div>
                            <div style="font-size:13px; color:#bbb;">${duration}</div>
                        </div>
                    </div>
                    <div class="call-again-btn">Call again</div>
                </div>
            `;
            messagesArea.insertAdjacentHTML('beforeend', logHTML);
            scrollToBottom();
            callTimerTxt.innerText = "00:00";
            startInactivityTimer();
        }

        function scrollToBottom() { chatContainer.scrollTop = chatContainer.scrollHeight; }
        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        msgInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });

        startInactivityTimer();
    </script>
</body>
</html>
