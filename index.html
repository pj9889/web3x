<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Messenger - Jacklyn Rose</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body, html { height: 100%; overflow: hidden; background-color: #fff; width: 100%; position: fixed; }

        /* Header */
        .header { position: fixed; top: 0; width: 100%; height: 60px; background: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; border-bottom: 1px solid #ddd; z-index: 1000; }
        .profile-section { display: flex; align-items: center; }
        .back-icon { margin-right: 15px; font-size: 20px; color: #0084ff; }
        .profile-pic-container { position: relative; width: 40px; height: 40px; }
        .profile-pic { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .active-symbol { position: absolute; bottom: 2px; right: 2px; width: 12px; height: 12px; background-color: #31a24c; border: 2px solid #fff; border-radius: 50%; }
        .user-info { margin-left: 10px; }
        .user-name { font-weight: bold; font-size: 16px; display: flex; align-items: center; }
        .verified-badge { color: #0084ff; font-size: 14px; margin-left: 5px; }
        .status-text { font-size: 12px; color: #65676b; }
        .video-call-btn { color: #0084ff; font-size: 22px; cursor: pointer; }

        /* Chat Body */
        .chat-container { position: absolute; top: 60px; bottom: 70px; width: 100%; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; background-color: #fff; scroll-behavior: smooth; }
        
        .middle-profile { text-align: center; margin: 20px 0; }
        .middle-pic { width: 80px; height: 80px; border-radius: 50%; margin-bottom: 10px; }
        .middle-name { font-size: 20px; font-weight: 800; }
        
        .message-wrapper { display: flex; flex-direction: column; margin-bottom: 12px; position: relative; width: 100%; }
        .message { max-width: 75%; padding: 10px 15px; border-radius: 18px; font-size: 15px; line-height: 1.4; }
        .received { background: #e4e6eb; align-self: flex-start; color: #000; }
        .sent { background: #0084ff; align-self: flex-end; color: #fff; }
        
        .status-icon { align-self: flex-end; font-size: 12px; color: #65676b; margin-top: 2px; height: 14px; display: flex; align-items: center; }
        .seen-img { width: 14px; height: 14px; border-radius: 50%; }

        .typing { font-size: 12px; color: #65676b; margin-bottom: 10px; display: none; font-weight: 500; }

        /* Registration Template */
        #regTemplate { display: none; background: #fff; border: 1px solid #ddd; border-radius: 15px; padding: 20px; text-align: center; margin: 10px auto; width: 90%; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .reg-btn { background: #0084ff; color: #fff; border: none; padding: 10px 25px; border-radius: 20px; font-weight: bold; cursor: pointer; text-decoration: none; display: inline-block; margin-top: 10px; }

        /* Footer */
        .footer { position: fixed; bottom: 0; width: 100%; background: #fff; padding: 10px; display: flex; align-items: center; gap: 10px; border-top: 1px solid #ddd; z-index: 1000; }
        .input-box { flex: 1; background: #f0f2f5; border-radius: 20px; padding: 8px 15px; }
        .input-box input { border: none; background: transparent; width: 100%; outline: none; font-size: 15px; }
        .send-btn { color: #0084ff; font-size: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <div class="profile-section">
            <i class="fa-solid fa-arrow-left back-icon"></i>
            <div class="profile-pic-container">
                <img src="https://i.pravatar.cc/150?u=jacklyn" class="profile-pic">
                <div class="active-symbol"></div>
            </div>
            <div class="user-info">
                <div class="user-name">Jacklyn Rose <i class="fa-solid fa-circle-check verified-badge"></i></div>
                <div class="status-text">Active now</div>
            </div>
        </div>
        <div class="video-call-btn"><i class="fa-solid fa-video"></i></div>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="middle-profile">
            <img src="https://i.pravatar.cc/150?u=jacklyn" class="middle-pic">
            <div class="middle-name">Jacklyn Rose</div>
            <div style="color: #65676b; font-size: 12px;">Messenger</div>
        </div>
        
        <div id="messagesArea"></div>

        <div id="regTemplate">
            <p style="font-weight: bold;">Unlock Private Chat & Photos</p>
            <p style="font-size: 13px; color: #65676b;">You've reached the message limit. Please register to continue talking with Jacklyn.</p>
            <a href="YOUR_REGISTRATION_LINK" class="reg-btn">Register for Free</a>
        </div>

        <div class="typing" id="typingIndicator">Jacklyn is typing...</div>
    </div>

    <div class="footer">
        <i class="fa-solid fa-circle-plus" style="color: #0084ff;"></i>
        <div class="input-box">
            <input type="text" placeholder="Aa" id="msgInput" autocomplete="off">
        </div>
        <i class="fa-solid fa-paper-plane send-btn" id="sendBtn"></i>
    </div>

    <script>
        // আপনার ওয়েবসাইটের লিঙ্কটি এখানে দিন
        const MY_SITE_URL = 'YOUR_WEBSITE_URL';

        // সার্ভিস ওয়ার্কার রেজিস্টার
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }

        const msgInput = document.getElementById('msgInput');
        const sendBtn = document.getElementById('sendBtn');
        const messagesArea = document.getElementById('messagesArea');
        const chatContainer = document.getElementById('chatContainer');
        const typingIndicator = document.getElementById('typingIndicator');
        const regTemplate = document.getElementById('regTemplate');

        let userMsgCount = 0;
        let replyIndex = 0;

        const autoReplies = [
            "Hey handsome, thanks for messaging me.. 😉",
            "I was just thinking about having some fun tonight. You interested? 😈",
            "I love a man who's confident. Tell me, what's your wildest fantasy?",
            "I'm actually getting ready to jump in the shower, wish you were here to help. 💦",
            "Why don't you come over and we can stop talking and start doing? 🔥",
            "I have a secret I only tell bad boys... are you a bad boy? 😇",
            "My bed feels way too empty tonight, just saying..."
        ];

        function renderMessage(text, type) {
            const wrapper = document.createElement('div');
            wrapper.className = 'message-wrapper';
            if(type === 'sent') {
                wrapper.innerHTML = `<div class="message sent">${text}</div><div class="status-icon"><img src="https://i.pravatar.cc/150?u=jacklyn" class="seen-img"></div>`;
            } else {
                wrapper.innerHTML = `<div class="message received">${text}</div>`;
            }
            messagesArea.appendChild(wrapper);
        }

        // সাটার নোটিফিকেশন ফাংশন (ক্লিক লিঙ্ক সহ)
        function sendPush(msg) {
            if (Notification.permission === "granted" && document.hidden) {
                navigator.serviceWorker.ready.then(reg => {
                    reg.showNotification("Jacklyn Rose ✓", {
                        body: msg,
                        icon: "https://i.pravatar.cc/150?u=jacklyn",
                        badge: "https://i.pravatar.cc/150?u=jacklyn",
                        tag: 'jacklyn-msg',
                        renotify: true,
                        data: {
                            url: MY_SITE_URL
                        }
                    });
                });
            }
        }

        // মেসেজ সেন্ড ফাংশন (১ম ক্লিকেই পারমিশন চাওয়া হবে)
        function sendMessage() {
            const text = msgInput.value.trim();
            if (text === "") return;

            // ট্রিক: প্রথম ক্লিকেই পারমিশন বক্স আসবে
            if (userMsgCount === 0 && "Notification" in window) {
                Notification.requestPermission();
            }

            if (userMsgCount >= 3) {
                showRegCard();
                return;
            }

            userMsgCount++;
            renderMessage(text, 'sent');
            msgInput.value = "";
            scrollToBottom();
            
            setTimeout(modelReply, 3000);
        }

        function modelReply() {
            if (replyIndex >= autoReplies.length) return;
            
            typingIndicator.style.display = 'block';
            scrollToBottom();

            setTimeout(() => {
                typingIndicator.style.display = 'none';
                const msg = autoReplies[replyIndex];
                renderMessage(msg, 'received');
                sendPush(msg);
                replyIndex++;
                scrollToBottom();

                if(userMsgCount >= 3) showRegCard();
                
                // অটো ফলো-আপ লুপ
                if(userMsgCount >= 3 && replyIndex < autoReplies.length) {
                    setTimeout(modelReply, 10000);
                }
            }, 4000);
        }

        function showRegCard() {
            msgInput.disabled = true;
            msgInput.placeholder = "Limit reached...";
            regTemplate.style.display = "block";
            scrollToBottom();
        }

        function scrollToBottom() { chatContainer.scrollTop = chatContainer.scrollHeight; }

        sendBtn.addEventListener('click', sendMessage);
        msgInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
