<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Messenger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        .chat-container { height: 100vh; display: flex; flex-direction: column; background: url('YOUR_PINK_HEART_BG_URL_HERE') no-repeat center; background-size: cover; }
        .messages-area { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; }
        .bubble { max-width: 70%; padding: 10px 15px; border-radius: 20px; margin-bottom: 10px; font-size: 15px; position: relative; }
        .visitor { align-self: flex-end; background: #0084ff; color: white; border-bottom-right-radius: 4px; }
        .model { align-self: flex-start; background: #f1f0f0; color: black; border-bottom-left-radius: 4px; }
        .typing { font-style: italic; font-size: 12px; color: #65676b; display: none; }
        #video-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 100; }
        #local-video { position: absolute; top: 20px; right: 20px; width: 100px; height: 150px; background: #333; border-radius: 10px; object-fit: cover; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="p-4 border-b bg-white/80 flex items-center justify-between">
        <div class="flex items-center">
            <div class="relative">
                <img src="MODEL_PROPIC_URL" class="w-10 h-10 rounded-full">
                <div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-white rounded-full"></div>
            </div>
            <div class="ml-3">
                <h1 class="font-bold text-sm">Mst Suraiya Akter</h1>
                <p class="text-xs text-gray-500">Active Now</p>
            </div>
        </div>
        <div class="flex space-x-4 text-pink-500">
            <button onclick="startManualCall()"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg></button>
            <div class="h-6 w-6 font-bold">ⓘ</div>
        </div>
    </div>

    <div class="messages-area" id="chatBox">
        <div class="flex flex-col items-center my-10">
            <img src="MODEL_PROPIC_URL" class="w-20 h-20 rounded-full mb-2">
            <h2 class="font-bold">Mst Suraiya Akter</h2>
            <p class="text-xs text-gray-500">You're not friends on Facebook</p>
        </div>
        </div>

    <div id="typing" class="px-4 py-1 typing">Mst Suraiya is typing...</div>

    <div class="p-3 border-t bg-white flex items-center" id="inputBar">
        <div class="flex space-x-3 text-pink-500 mr-2 font-bold text-xl">+ 📸 🖼️ 🎙️</div>
        <input type="text" id="msgInput" class="flex-1 bg-gray-100 rounded-full px-4 py-2 outline-none text-sm" placeholder="Message...">
        <button onclick="sendMessage()" class="ml-2 text-pink-500 font-bold">Send</button>
    </div>
</div>

<div id="video-overlay">
    <video id="main-video" class="w-full h-full object-cover"></video>
    <video id="local-video" autoplay muted></video>
    <div class="absolute bottom-10 w-full flex justify-center space-x-10">
        <button onclick="endCall()" class="bg-red-500 p-4 rounded-full text-white">✖️</button>
    </div>
</div>

<div id="incoming-call" class="hidden fixed inset-0 bg-pink-50 flex flex-col items-center justify-center z-[200]">
    <img src="MODEL_PROPIC_URL" class="w-32 h-32 rounded-full border-4 border-white shadow-lg animate-pulse">
    <h2 class="mt-4 font-bold text-xl">Mst Suraiya Akter</h2>
    <p class="text-gray-500">Messenger Video Call...</p>
    <div class="mt-20 flex space-x-20">
        <button onclick="rejectCall()" class="bg-red-500 p-5 rounded-full text-white">Decline</button>
        <button onclick="acceptCall()" class="bg-green-500 p-5 rounded-full text-white">Accept</button>
    </div>
    <audio id="ringtone" loop src="RINGTONE_URL_HERE"></audio>
</div>

<script>
    let msgCount = 0;
    const replies = ["Hello, How are you☺️", "You look handsome!", "What are you doing?", "Can we be friends?", "I was waiting for you..."]; // এখানে ৩০টি বাড়াতে পারেন
    let hasAcceptedAutoCall = false;

    // ১. অটো ভিডিও কল (১২ সেকেন্ড পর)
    setTimeout(() => {
        if(!hasAcceptedAutoCall) showIncomingUI();
    }, 12000);

    function showIncomingUI() {
        document.getElementById('incoming-call').classList.remove('hidden');
        document.getElementById('ringtone').play();
    }

    function acceptCall() {
        if(hasAcceptedAutoCall) return;
        hasAcceptedAutoCall = true;
        document.getElementById('ringtone').pause();
        document.getElementById('incoming-call').classList.add('hidden');
        document.getElementById('video-overlay').style.display = 'block';
        
        // ভিডিও সেট করা
        const v = document.getElementById('main-video');
        v.src = "AUTO_CALL_VIDEO_URL";
        v.play();

        // লোকাল ক্যামেরা অন
        navigator.mediaDevices.getUserMedia({video: true}).then(s => {
            document.getElementById('local-video').srcObject = s;
        });

        setTimeout(endCall, 10000); // ১০ সেকেন্ড পর কল কাটা
    }

    function endCall() {
        document.getElementById('video-overlay').style.display = 'none';
        showRegistration();
    }

    function rejectCall() {
        document.getElementById('incoming-call').classList.add('hidden');
        document.getElementById('ringtone').pause();
        setTimeout(showIncomingUI, 30000); // ৩০ সেকেন্ড পর আবার অটো কল
    }

    function startManualCall() {
        document.getElementById('video-overlay').style.display = 'block';
        const v = document.getElementById('main-video');
        v.src = "MANUAL_CALL_VIDEO_URL";
        v.play();
        setTimeout(endCall, 10000);
    }

    // চ্যাট সিস্টেম
    function sendMessage() {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if(!text) return;

        appendMessage(text, 'visitor');
        input.value = '';

        if(msgCount < 5) {
            document.getElementById('typing').style.display = 'block';
            setTimeout(() => {
                document.getElementById('typing').style.display = 'none';
                appendMessage(replies[msgCount], 'model');
                msgCount++;
            }, 5000);
        } else {
            showRegistration();
        }
    }

    function appendMessage(text, side) {
        const box = document.getElementById('chatBox');
        const div = document.createElement('div');
        div.className = bubble ${side};
        div.innerText = text;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    function showRegistration() {
        alert("To continue messaging and calling, please register for free!");
        window.location.href = "YOUR_AFFILIATE_LINK_HERE";
    }
</script>

</body>
