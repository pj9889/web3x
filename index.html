<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Messenger - Jacklyn Rose</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body, html { height: 100%; overflow: hidden; background-color: #fff; width: 100%; position: fixed; }

        /* Header */
        .header { position: fixed; top: 0; width: 100%; height: 60px; background: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; border-bottom: 1px solid #ddd; z-index: 1000; }
        .profile-section { display: flex; align-items: center; }
        .back-icon { margin-right: 12px; font-size: 18px; color: #0084ff; }
        .profile-pic-container { position: relative; width: 40px; height: 40px; }
        .profile-pic { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .active-symbol { position: absolute; bottom: 2px; right: 2px; width: 12px; height: 12px; background-color: #31a24c; border: 2px solid #fff; border-radius: 50%; }
        .user-info { margin-left: 10px; }
        .user-name { font-weight: bold; font-size: 16px; display: flex; align-items: center; }
        .verified-badge { color: #0084ff; font-size: 14px; margin-left: 5px; }
        .status-text { font-size: 12px; color: #65676b; }
        .header-icons { color: #0084ff; font-size: 20px; display: flex; gap: 15px; }

        /* Chat Body */
        .chat-container { position: absolute; top: 60px; bottom: 70px; width: 100%; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; background-color: #fff; scroll-behavior: smooth; }
        
        .middle-profile { text-align: center; margin: 30px 0; }
        .middle-pic { width: 100px; height: 100px; border-radius: 50%; margin-bottom: 10px; }
        .middle-name { font-size: 24px; font-weight: 800; display: flex; align-items: center; justify-content: center; }
        .middle-sub { color: #65676b; font-size: 14px; margin-bottom: 15px; }

        .message-wrapper { display: flex; flex-direction: column; margin-bottom: 15px; position: relative; width: 100%; }
        .message { max-width: 75%; padding: 10px 16px; border-radius: 20px; font-size: 15px; line-height: 1.4; }
        .received { background: #e4e6eb; align-self: flex-start; color: #000; border-bottom-left-radius: 4px; }
        .sent { background: #0084ff; align-self: flex-end; color: #fff; border-bottom-right-radius: 4px; }
        
        .status-icon { align-self: flex-end; font-size: 12px; color: #65676b; margin-top: 4px; display: flex; align-items: center; }
        .seen-img { width: 14px; height: 14px; border-radius: 50%; }

        .typing { font-size: 12px; color: #65676b; margin-bottom: 10px; display: none; font-weight: 500; }

        /* Footer */
        .footer { position: fixed; bottom: 0; width: 100%; background: #fff; padding: 10px 15px; display: flex; align-items: center; gap: 12px; border-top: 1px solid #ddd; z-index: 1000; }
        .footer-icon { color: #0084ff; font-size: 22px; }
        .input-box { flex: 1; background: #f0f2f5; border-radius: 20px; padding: 8px 15px; }
        .input-box input { border: none; background: transparent; width: 100%; outline: none; font-size: 15px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="profile-section">
            <i class="fa-solid fa-chevron-left back-icon"></i>
            <div class="profile-pic-container">
                <img src="https://i.pravatar.cc/150?u=jacklyn" class="profile-pic">
                <div class="active-symbol"></div>
            </div>
            <div class="user-info">
                <div class="user-name">Jacklyn Rose <i class="fa-solid fa-circle-check verified-badge"></i></div>
                <div class="status-text">Active now</div>
            </div>
        </div>
        <div class="header-icons">
            <i class="fa-solid fa-phone"></i>
            <i class="fa-solid fa-video"></i>
            <i class="fa-solid fa-circle-info"></i>
        </div>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="middle-profile">
            <img src="https://i.pravatar.cc/150?u=jacklyn" class="middle-pic">
            <div class="middle-name">Jacklyn Rose <i class="fa-solid fa-circle-check verified-badge" style="font-size: 18px;"></i></div>
            <div class="middle-sub">You're friends on Facebook</div>
            <div style="color: #65676b; font-size: 13px;">Lives in Miami, Florida</div>
        </div>
        
        <div id="messagesArea"></div>
        <div class="typing" id="typingIndicator">Jacklyn is typing...</div>
    </div>

    <div class="footer">
        <i class="fa-solid fa-circle-plus footer-icon"></i>
        <i class="fa-solid fa-camera footer-icon"></i>
        <i class="fa-solid fa-image footer-icon"></i>
        <div class="input-box">
            <input type="text" placeholder="Aa" id="msgInput" autocomplete="off">
        </div>
        <i class="fa-solid fa-paper-plane footer-icon" id="sendBtn" style="cursor: pointer;"></i>
    </div>

    <script>
        const SITE_URL = 'YOUR_WEBSITE_URL';

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }

        const msgInput = document.getElementById('msgInput');
        const sendBtn = document.getElementById('sendBtn');
        const messagesArea = document.getElementById('messagesArea');
        const chatContainer = document.getElementById('chatContainer');
        const typingIndicator = document.getElementById('typingIndicator');

        let userMsgCount = parseInt(localStorage.getItem('userMsgCount')) || 0;
        let replyIndex = parseInt(localStorage.getItem('replyIndex')) || 0;
        let isAutoLoopStarted = localStorage.getItem('isAutoLoopStarted') === 'true';

        const autoReplies = [
            "Hey handsome, thanks for messaging me.. 😉",
            "I was just thinking about having some fun tonight. You interested? 😈",
            "I love a man who's confident. Tell me, what's your wildest fantasy?",
            "I'm actually getting ready to jump in the shower, wish you were here to help. 💦",
            "Why don't you come over and we can stop talking and start doing? 🔥",
            "I have a secret I only tell bad boys... are you a bad boy? 😇",
            "My bed feels way too empty tonight, just saying..."
        ];

        function saveToLocal(sender, text, type) {
            let history = JSON.parse(localStorage.getItem('chatHistory')) || [];
            history.push({ sender, text, type });
            localStorage.setItem('chatHistory', JSON.stringify(history));
            localStorage.setItem('userMsgCount', userMsgCount);
            localStorage.setItem('replyIndex', replyIndex);
            localStorage.setItem('isAutoLoopStarted', isAutoLoopStarted);
        }

        function loadHistory() {
            let history = JSON.parse(localStorage.getItem('chatHistory')) || [];
            history.forEach(chat => renderMessage(chat.text, chat.type));
            scrollToBottom();
            // যদি আগে থেকেই লুপ শুরু হয়ে থাকে তবে রিফ্রেশ করলেও চলবে
            if(isAutoLoopStarted) {
                setTimeout(modelReply, 5000);
            }
        }

        function renderMessage(text, type) {
            const wrapper = document.createElement('div');
            wrapper.className = 'message-wrapper';
            if(type === 'sent') {
                wrapper.innerHTML = `<div class="message sent">${text}</div><div class="status-icon"><img src="https://i.pravatar.cc/150?u=jacklyn" class="seen-img"></div>`;
            } else {
                wrapper.innerHTML = `<div class="message received">${text}</div>`;
            }
            messagesArea.appendChild(wrapper);
        }

        function sendPush(msg) {
            if (Notification.permission === "granted" && document.hidden) {
                navigator.serviceWorker.ready.then(reg => {
                    reg.showNotification("Jacklyn Rose ✓", {
                        body: msg,
                        icon: "https://i.pravatar.cc/150?u=jacklyn",
                        badge: "https://i.pravatar.cc/150?u=jacklyn",
                        tag: 'jacklyn-msg',
                        renotify: true,
                        data: { url: SITE_URL }
                    });
                });
            }
        }

        function sendMessage() {
            const text = msgInput.value.trim();
            if (text === "") return;

            // প্রথম মেসেজেই পারমিশন চাওয়া
            if (userMsgCount === 0 && "Notification" in window) {
                Notification.requestPermission();
            }

            userMsgCount++;
            renderMessage(text, 'sent');
            saveToLocal('You', text, 'sent');
            msgInput.value = "";
            scrollToBottom();
            
            // ৩টি মেসেজ পর্যন্ত ইউজারের মেসেজ অনুযায়ী রিপ্লাই দিবে
            if (!isAutoLoopStarted) {
                setTimeout(modelReply, 3000);
            }
        }

        function modelReply() {
            if (replyIndex >= autoReplies.length) return;
            
            typingIndicator.style.display = 'block';
            scrollToBottom();

            setTimeout(() => {
                typingIndicator.style.display = 'none';
                const msg = autoReplies[replyIndex];
                renderMessage(msg, 'received');
                saveToLocal('Jacklyn', msg, 'received');
                sendPush(msg);
                replyIndex++;
                scrollToBottom();

                // ৩ নম্বর রিপ্লাই শেষ হলে লুপ মুড অন হবে
                if (replyIndex >= 3) {
                    isAutoLoopStarted = true;
                    localStorage.setItem('isAutoLoopStarted', 'true');
                }

                // যদি ৩টি রিপ্লাই হয়ে গিয়ে থাকে, তবে ১০ সেকেন্ড পর পর পরেরটি আসবে
                if (isAutoLoopStarted && replyIndex < autoReplies.length) {
                    setTimeout(modelReply, 10000); // ১০ সেকেন্ড বিরতি
                }
            }, 3000);
        }

        function scrollToBottom() { chatContainer.scrollTop = chatContainer.scrollHeight; }

        sendBtn.addEventListener('click', sendMessage);
        msgInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

        window.onload = loadHistory;
    </script>
</body>
</html>
