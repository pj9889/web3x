<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Messenger - Chat</title>
    <style>
        /* CSS Styles */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; width: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }

        .app-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(rgba(255, 192, 203, 0.7), rgba(255, 182, 193, 0.7)), url('https://i.ibb.co/LzNf9mS/pink-hearts.jpg');
            background-size: cover;
            background-position: center;
        }

        /* Header */
        .header {
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.95);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e5e5e5;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .user-profile { display: flex; align-items: center; }
        .avatar-container { position: relative; width: 40px; height: 40px; }
        .avatar { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .online-dot { position: absolute; bottom: 2px; right: 2px; width: 12px; height: 12px; background: #31a24c; border: 2px solid white; border-radius: 50%; }
        .user-text { margin-left: 10px; }
        .user-text h4 { font-size: 16px; color: #050505; }
        .user-text p { font-size: 12px; color: #65676b; }
        .header-icons img { width: 24px; margin-left: 15px; cursor: pointer; }

        /* Chat Body */
        .chat-body { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; }
        .center-profile { text-align: center; margin-bottom: 30px; margin-top: 20px; }
        .large-avatar { width: 100px; height: 100px; border-radius: 50%; margin-bottom: 10px; border: 3px solid white; }
        .add-friend-btn { background: #0084ff; color: white; border: none; padding: 8px 16px; border-radius: 6px; font-weight: bold; margin-top: 10px; }

        /* Messages */
        .msg { max-width: 75%; padding: 10px 15px; border-radius: 18px; margin-bottom: 8px; font-size: 15px; line-height: 1.4; position: relative; }
        .msg.bot { align-self: flex-start; background: white; color: black; border-bottom-left-radius: 4px; }
        .msg.user { align-self: flex-end; background: #0084ff; color: white; border-bottom-right-radius: 4px; }
        .typing { font-size: 12px; color: #65676b; margin-bottom: 10px; display: none; }

        /* Footer */
        .footer { padding: 10px; background: white; display: flex; align-items: center; }
        .input-box { flex: 1; background: #f0f2f5; border-radius: 20px; padding: 8px 15px; display: flex; align-items: center; }
        .input-box input { border: none; background: transparent; flex: 1; outline: none; font-size: 15px; }
        .send-btn { color: #0084ff; font-weight: bold; margin-left: 10px; cursor: pointer; border:none; background:none; font-size: 18px; }

        /* Overlays */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; }
        .video-container { width: 100%; height: 100%; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .call-ui { position: absolute; bottom: 50px; width: 100%; display: flex; justify-content: space-around; }
        .call-btn { width: 65px; height: 65px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; font-size: 24px; color: white; }
        .decline { background: #ff3b30; }
        .accept { background: #4cd964; }

        .popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; width: 85%; padding: 25px; border-radius: 15px; text-align: center; z-index: 2000; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .reg-link { display: inline-block; background: #0084ff; color: white; text-decoration: none; padding: 12px 25px; border-radius: 8px; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div class="user-profile">
            <div class="avatar-container">
                <img src="https://i.pravatar.cc/150?u=suraiya" class="avatar">
                <div class="online-dot"></div>
            </div>
            <div class="user-text">
                <h4>Mst Suraiya Akter</h4>
                <p>Active now</p>
            </div>
        </div>
        <div class="header-icons">
            <img src="https://cdn-icons-png.flaticon.com/512/1159/1159791.png" id="manualCall" alt="Video">
            <img src="https://cdn-icons-png.flaticon.com/512/471/471663.png" alt="Info">
        </div>
    </div>

    <div class="chat-body" id="chatBox">
        <div class="center-profile">
            <img src="https://i.pravatar.cc/150?u=suraiya" class="large-avatar">
            <h2>Mst Suraiya Akter</h2>
            <p>1 mutual friend: Zarin Tasnim Joba</p>
            <button class="add-friend-btn" id="addFriend">Add Friend</button>
        </div>
        <div id="messagesArea"></div>
        <div id="typingIndicator" class="typing">Suraiya is typing...</div>
    </div>

    <div class="footer">
        <div class="input-box">
            <input type="text" id="userInput" placeholder="Aa">
        </div>
        <button class="send-btn" id="sendBtn">➤</button>
    </div>
</div>

<div id="callOverlay" class="overlay">
    <div id="incomingUI">
        <img src="https://i.pravatar.cc/150?u=suraiya" style="width:100px; border-radius:50%; margin-bottom:20px;">
        <h2>Mst Suraiya Akter</h2>
        <p>Incoming Video Call...</p>
        <div class="call-ui">
            <button class="call-btn decline" onclick="closeCall()">✖️</button>
            <button class="call-btn accept" onclick="startVideo()">✔️</button>
        </div>
    </div>
    <div id="videoPlayerArea" style="display:none; width:100%; height:100%;">
        <video id="v-player" playsinline></video>
        <div style="position:absolute; bottom:30px; width:100%; text-align:center;">
             <button class="call-btn decline" style="margin:auto;" onclick="closeCall()">✖️</button>
        </div>
    </div>
    <audio id="ringtone" src="https://www.soundjay.com/phone/phone-calling-1.mp3" loop></audio>
</div>

<div id="regPopup" class="popup">
    <h3>Message Limit Reached</h3>
    <p>Please register for free to continue messaging and video calling.</p>
    <a href="YOUR_AFFILIATE_LINK" class="reg-link">REGISTER FOR FREE</a>
</div>

<script>
    let msgCount = 0;
    let callReceived = false;
    let hasRegistered = false;

    const replies = [
        "Hello, How are you☺️", "I was waiting for you!", "You are so cute ❤️", 
        "Where are you from?", "I like your profile picture", "Can we be friends?",
        "Do you like video calling?", "I'm feeling a bit bored tonight...", 
        "Are you single? 😉", "You have a nice name!", "Tell me more about you",
        "I am from Dhaka, you?", "Let's talk more!", "You're so sweet!",
        "Do you want to see my live video?", "I'm just lying on bed...",
        "Are you busy right now?", "I love making new friends", "You seem special",
        "Let's play a game?", "What do you do for living?", "Hehe, you are funny",
        "I'm feeling naughty today 😈", "Should I call you?", "I'm so lonely...",
        "Send me a photo!", "I like your style", "Will you take me on a date?",
        "You're very charming", "Keep talking to me!"
    ];

    const chatBox = document.getElementById('chatBox');
    const messagesArea = document.getElementById('messagesArea');
    const typingIndicator = document.getElementById('typingIndicator');

    // Send Message
    document.getElementById('sendBtn').onclick = () => {
        const text = document.getElementById('userInput').value;
        if(!text) return;
        
        if(msgCount >= 5) {
            document.getElementById('regPopup').style.display = 'block';
            return;
        }

        appendMsg(text, 'user');
        document.getElementById('userInput').value = '';
        msgCount++;

        // Auto Reply
        setTimeout(() => { typingIndicator.style.display = 'block'; chatBox.scrollTop = chatBox.scrollHeight; }, 2000);
        setTimeout(() => {
            typingIndicator.style.display = 'none';
            appendMsg(replies[Math.floor(Math.random()*replies.length)], 'bot');
        }, 5000);
    };

    function appendMsg(text, sender) {
        const div = document.createElement('div');
        div.className = msg ${sender};
        div.innerText = text;
        messagesArea.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    // Call Logic
    function triggerCall() {
        if(!callReceived) {
            document.getElementById('callOverlay').style.display = 'flex';
            document.getElementById('ringtone').play();
        }
    }

    setTimeout(triggerCall, 12000); // 12 sec first call
    setInterval(() => { if(!callReceived) triggerCall(); }, 30000); // repeat every 30s

    function startVideo() {
        document.getElementById('ringtone').pause();
        document.getElementById('incomingUI').style.display = 'none';
        document.getElementById('videoPlayerArea').style.display = 'block';
        const player = document.getElementById('v-player');
        player.src = "YOUR_VIDEO_LINK_1"; // ওয়েবসাইট থেকে আসা কল
        player.play();
        callReceived = true;
        
        setTimeout(() => {
            closeCall();
            document.getElementById('regPopup').style.display = 'block';
        }, 10000);
    }

    document.getElementById('manualCall').onclick = () => {
        document.getElementById('callOverlay').style.display = 'flex';
        setTimeout(() => {
            document.getElementById('incomingUI').style.display = 'none';
            document.getElementById('videoPlayerArea').style.display = 'block';
            const player = document.getElementById('v-player');
            player.src = "YOUR_VIDEO_LINK_2"; // ভিজিটর নিজে কল দিলে
            player.play();
            setTimeout(() => { closeCall(); document.getElementById('regPopup').style.display = 'block'; }, 10000);
        }, 3000);
    };

    function closeCall() {
        document.getElementById('callOverlay').style.display = 'none';
        document.getElementById('ringtone').pause();
        document.getElementById('v-player').pause();
    }

    // Add Friend / Followup Logic
    document.getElementById('addFriend').onclick = function() {
        this.innerText = "Request Sent";
        alert("Added to Home Screen! You will receive notifications.");
        startFollowUps();
    };

    function startFollowUps() {
        // First 10 messages every 10 seconds
        for(let i=0; i<10; i++) {
            setTimeout(() => {
                sendNotification("Suraiya: Hey, are you there?");
            }, (i+1) * 10000);
        }
        // Hourly messages thereafter
        setInterval(() => {
            sendNotification("Suraiya: I'm missing you... come back to chat!");
        }, 3600000);
    }

    function sendNotification(msg) {
        if (Notification.permission === "granted") {
            new Notification("Mst Suraiya Akter", { body: msg, icon: "https://i.pravatar.cc/150?u=suraiya" });
        } else {
            Notification.requestPermission();
        }
    }
</script>
</body>
</html>
